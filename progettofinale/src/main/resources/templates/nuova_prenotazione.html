<!DOCTYPE html>
<html>
<head>
    <title>Nuova Prenotazione</title>
</head>
<body id="body-nuova-prenotazione">

<header id="header-nuova-prenotazione">
    <h1 id="title-nuova-prenotazione">Effettua una Prenotazione</h1>
</header>

<main id="main-nuova-prenotazione">

    <form id="form-nuova-prenotazione" action="/prenotazioni" method="post">

        <input type="hidden" id="input-utente-id" name="utenteId" th:value="${utenteLoggatoId}" required>

        <label for="input-persone">Numero Persone:</label>
        <input type="number" id="input-persone" name="numeroPersone" placeholder="Numero di ospiti" min="1" required>

        <label for="input-data">Data e Ora Prenotazione:</label>
        <input type="datetime-local" id="input-data" name="dataOra" required>

        <button id="btn-invia-prenotazione" type="submit">Conferma Prenotazione</button>

    </form>

    <div style="margin-top: 15px;">
        <a id="link-ritorno" href="/">Torna alla Home</a>
    </div>

</main>
</body>
</html>
