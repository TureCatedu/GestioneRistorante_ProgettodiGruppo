<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Errore dell'Applicazione</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div style="margin: 50px; padding: 20px; border: 1px solid red; background-color: #fdd;">
        <h1>Si è verificato un errore!</h1>
        
        <p><strong>Codice di Stato:</strong> <span th:text="${status}">500</span></p>
        <p><strong>Errore:</strong> <span th:text="${error}">Internal Server Error</span></p>
        <p><strong>Dettaglio:</strong> <span th:text="${message}">Messaggio di errore</span></p>
        <p><strong>Data/Ora:</strong> <span th:text="${timestamp}">Oggi</span></p>
        
        <hr>
        <a th:href="@{/}">Torna alla Home</a>
    </div>
</body>
</html>
