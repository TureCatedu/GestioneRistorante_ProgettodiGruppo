<!DOCTYPE html>
<html>
<head>
    <title>Utenti</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body id="body-utenti">
<header id="header-utenti">
    <div class="container header-content">
        <h1 id="title-utenti">Lista Utenti</h1>
        <a href="/" style="color: white; text-decoration: none;">Torna alla Home</a>
    </div>
</header>
<main id="main-utenti" class="container mt-2">

    <div class="card table-responsive">
        <table id="table-utenti">
            <thead id="thead-utenti">
                <tr id="row-header-utenti">
                    <th>ID</th>
                    <th>Nome</th>
                    <th>Cognome</th>
                    <th>Email</th>
                    <th>Ruolo</th>
                </tr>
            </thead>
            <tbody id="tbody-utenti">
                <tr th:each="u : ${utenti}">
                    <td th:text="${u.id}"></td>
                    <td th:text="${u.nome}"></td>
                    <td th:text="${u.cognome}"></td>
                    <td th:text="${u.email}"></td>
                    <td>
                        <form th:action="@{'/utenti/' + ${u.id} + '/cambia-ruolo'}" method="post">
                            <input type="hidden" name="_method" value="put"/> 
                            
                            <select name="nuovoRuolo" onchange="this.form.submit()">
                                <option value="CLIENTE" th:selected="${#strings.toString(u.ruolo) == 'CLIENTE'}">Cliente</option>
                                <option value="CAMERIERE" th:selected="${#strings.toString(u.ruolo) == 'CAMERIERE'}">Cameriere</option>
                                <option value="AMMINISTRATORE" th:selected="${#strings.toString(u.ruolo) == 'AMMINISTRATORE'}">Amministratore</option>
                            </select>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <div class="text-center mt-2">
        <a id="link-home" href="/" class="btn btn-secondary" style="width: auto;">Torna alla Home</a>
    </div>
</main>
</body>
</html>
