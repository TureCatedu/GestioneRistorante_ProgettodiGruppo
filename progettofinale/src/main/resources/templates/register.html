<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
</head>

<body id="body-register">

<header id="header-register">
    <h1 id="title-register">Registrazione</h1>
</header>

<main id="main-register">

<form id="form-register" action="/utenti" method="post">

    <input id="input-nome" name="nome" placeholder="Nome">
    <input id="input-cognome" name="cognome" placeholder="Cognome">
    <input id="input-email" name="email" placeholder="Email">
    <input id="input-password" name="password" placeholder="Password">

    <button id="btn-register" type="submit">Crea account</button>

</form>

</main>

</body>
</html>
