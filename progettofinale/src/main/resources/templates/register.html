<!-- REGISTER -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Registrazione</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body id="body-register">
<header>
    <div class="container text-center"><h1>Nuovo Account</h1></div>
</header>
<main class="container" style="max-width: 500px; margin-top: 40px;">
    <div class="card">
        <form action="/utenti" method="post">
            <div class="form-group">
                <label>Nome</label>
                <input name="nome" placeholder="Es. Mario" required>
            </div>
            <div class="form-group">
                <label>Cognome</label>
                <input name="cognome" placeholder="Es. Rossi" required>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" placeholder="mario.rossi@email.com" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="Crea una password" required>
            </div>
            <div class="form-group">
                <label>Ruolo Richiesto</label>
                <select name="ruolo" required>
                    <option value="" disabled selected>-- Seleziona un ruolo --</option>
                    <option value="CLIENTE">Utente</option>
                </select>
            </div>
            <button class="btn" type="submit">Registrati</button>
        </form>
        <div class="text-center mt-2">
            <p class="text-muted">Hai già un account? <a href="/login" style="color: var(--primary-color);">Accedi qui</a></p>
        </div>
    </div>
</main>
</body>
</html>
