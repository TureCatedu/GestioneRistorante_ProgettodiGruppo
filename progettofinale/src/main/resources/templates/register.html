<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
</head>

<body id="body-register">

<header id="header-register">
    <h1 id="title-register">Registrazione</h1>
</header>

<main id="main-register">

<form id="form-register" action="/utenti" method="post">

    <input id="input-nome" name="nome" placeholder="Nome" required>
    <input id="input-cognome" name="cognome" placeholder="Cognome" required>
    <input id="input-email" name="email" placeholder="Email" required>
    <input id="input-password" type="password" name="password" placeholder="Password" required>

    <div id="div-ruolo" style="margin-top: 10px; margin-bottom: 10px;">
        <label for="select-ruolo">Seleziona il tuo ruolo:</label>
        <select id="select-ruolo" name="ruolo" required>
            <option value="" disabled selected>-- Scegli un ruolo --</option>
            <option value="CLIENTE">Cliente</option>
            <option value="CAMERIERE">Cameriere</option>
            <option value="AMMINISTRATORE">Amministratore</option>
        </select>
    </div>

    <button id="btn-register" type="submit">Crea account</button>

</form>

<div id="div-to-login" style="margin-top: 15px;">
    <p>Hai già un account? <a id="link-to-login" href="/login">Accedi qui</a></p>
</div>

</main>

</body>
</html>
