<!-- LOGIN - Pagina di accesso al sistema -->
<!DOCTYPE html>
<!-- 
  xmlns:th="http://www.thymeleaf.org" 
  Questo namespace permette a Thymeleaf di processare gli attributi speciali (th:*) in questo file HTML
  Senza questo, gli attributi Thymeleaf verranno ignorati dal browser
-->
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login</title>
    
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body id="body-login">
<header>
    <div class="container text-center"><h1>Area Riservata</h1></div>
</header>
<main class="container" style="max-width: 450px; margin-top: 50px;">
    <div class="card">
        <h2 class="text-center" style="margin-top:0;">Accedi</h2>
        <!-- 
          th:action="@{/perform_login}"
          Specifica dove viene inviato il form quando l'utente clicca "Accedi"
          POST /perform_login -> Spring Security intercetta questo endpoint e autentica l'utente
        -->
        <form th:action="@{/perform_login}" method="post">
            <div class="form-group">
                <label for="input-email">Email</label>
                <!-- 
                  name="username"
                  IMPORTANTE: Spring Security cerca il parametro "username" e "password"
                  Anche se l'etichetta dice "Email", il name deve essere "username"
                -->
                <input id="input-email" name="username" placeholder="Inserisci la tua email" required>
            </div>
            <div class="form-group">
                <label for="input-password">Password</label>
                <!-- name="password" - Spring Security cerca questo parametro -->
                <input id="input-password" type="password" name="password" placeholder="Inserisci la password" required>
            </div>
            <button class="btn" type="submit">Accedi</button>
        </form>
        <div class="text-center mt-2">
            <p class="text-muted">Non hai un account? <a href="/register" style="color: var(--primary-color);">Registrati qui</a></p>
        </div>
    </div>
</main>
</body>
</html>
