<!-- LOGIN -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body id="body-login">
<header>
    <div class="container text-center"><h1>Area Riservata</h1></div>
</header>
<main class="container" style="max-width: 450px; margin-top: 50px;">
    <div class="card">
        <h2 class="text-center" style="margin-top:0;">Accedi</h2>
        <form th:action="@{/perform_login}" method="post">
            <div class="form-group">
                <label for="input-email">Email</label>
                <input id="input-email" name="username" placeholder="Inserisci la tua email" required>
            </div>
            <div class="form-group">
                <label for="input-password">Password</label>
                <input id="input-password" type="password" name="password" placeholder="Inserisci la password" required>
            </div>
            <button class="btn" type="submit">Accedi</button>
        </form>
        <div class="text-center mt-2">
            <p class="text-muted">Non hai un account? <a href="/register" style="color: var(--primary-color);">Registrati qui</a></p>
        </div>
    </div>
</main>
</body>
</html>
