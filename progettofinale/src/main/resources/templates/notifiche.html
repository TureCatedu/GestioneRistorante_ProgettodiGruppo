<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Notifiche</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<header>
    <div class="container header-content">
        <h1>Le mie Notifiche</h1>
        <a href="/" style="color: white; text-decoration: none;">Torna alla Home</a>
    </div>
</header>

<main class="container mt-2">

    <div class="warning-box">
        <h3 style="margin-top: 0; color: #856404;">Gestione Notifiche</h3>
        <p style="color: #856404; margin-bottom: 15px;">Cliccando sul pulsante eliminerai definitivamente l'intero storico delle tue notifiche personali.</p>
        <form action="/notificatore/utente/me" method="post" onsubmit="return confirm('Sei sicuro? L\'azione è irreversibile.');">
            <input type="hidden" name="_method" value="delete" />
            <button class="btn btn-danger" type="submit">Svuota tutte le Notifiche</button>
        </form>
    </div>

    <div class="card table-responsive">
        <table>
            <thead>
                <tr>
                    <th>Data / ID</th>
                    <th>Rif. Prenotazione</th>
                    <th>Messaggio</th>
                    <th>Azioni</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="n : ${notifiche}">
                    <td th:text="${n.id}"></td>
                    <td th:text="${n.prenotazioneId}"></td> 
                    <td th:text="${n.descrizione}"></td>
                    <td>
                        <form th:action="@{/notificatore/{id}(id=${n.id})}" method="post" th:onsubmit="return confirm('Eliminare questa notifica?');">
                            <input type="hidden" name="_method" value="DELETE" />
                            <button class="btn btn-danger" type="submit">Elimina</button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</main>
</body>
</html>
